  <script>
    
document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  const FONT_MIME = /^(font[/]|application[/](x-)?font-|application[/]vnd\.ms-fontobject)/i;
  const MIME_TOKEN = /^[\w.+-]+[/][\w.+-]+$/;
  function toBase64(bytes) {
    let bin = '';
    for (let i = 0; i < bytes.length; i += 0x8000) {
      bin += String.fromCharCode.apply(null, bytes.subarray(i, i + 0x8000));
    }
    return btoa(bin);
  }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        if (FONT_MIME.test(entry.mime) && MIME_TOKEN.test(entry.mime)) {
          // Strict artifact hosts allow font-src data: but not blob:.
          blobUrls[uuid] = 'data:' + entry.mime + ';base64,' +
            (entry.compressed ? toBase64(finalBytes) : entry.data);
        } else {
          blobUrls[uuid] = URL.createObjectURL(new Blob([finalBytes], { type: entry.mime }));
        }
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        blobUrls[uuid] = URL.createObjectURL(new Blob([], { type: entry.mime }));
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    setStatus('Rendering...');
    for (const uuid of uuids) template = template.split(uuid).join(blobUrls[uuid]);

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).split('</' + 'script>').join('<\\/' + 'script>') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);
    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: fetch and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const r = await fetch(s.src);
        s.textContent = await r.text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

  </script>

2em;\">Nosotros<\u002Fa>\n        <a href=\"#contacto\" style=\"font-size:14px; font-weight:500; letter-spacing:0.02em;\">Contacto<\u002Fa>\n      <\u002Fnav>\n      <a href=\"#servicios\" style=\"background:#124b27; color:#EDE8D0; padding:12px 24px; border-radius:2px; font-size:14px; font-weight:600; letter-spacing:0.02em; white-space:nowrap;\" style-hover=\"background:#0b3019;\">Ver planes<\u002Fa>\n    <\u002Fdiv>\n  <\u002Fheader>\n\n  <!-- HERO -->\n  <section style=\"{{ heroSectionStyle }}\">\n    <div style=\"{{ heroTextWrapStyle }}\">\n      <div style=\"font-size:13px; font-weight:600; letter-spacing:0.16em; text-transform:uppercase; color:#124b27; opacity:0.6; margin-bottom:24px;\">Estudio de diseño web<\u002Fdiv>\n      <h1 style=\"{{ heroHeadlineStyle }}\">Páginas web con la elegancia de una marca de lujo.<\u002Fh1>\n      <p style=\"{{ heroSubcopyStyle }}\">Diseñamos y desarrollamos sitios a medida para marcas que no se conforman con lo genérico. Cada proyecto, una pieza única.<\u002Fp>\n      <div style=\"{{ heroCtaRowStyle }}\">\n        <a href=\"#servicios\" style=\"background:#124b27; color:#EDE8D0; padding:16px 32px; border-radius:2px; font-size:15px; font-weight:600; letter-spacing:0.02em;\" style-hover=\"background:#0b3019;\">Ver planes<\u002Fa>\n        <a href=\"#portafolio\" style=\"font-size:15px; font-weight:600; border-bottom:1px solid #124b27; padding-bottom:2px;\">Ver portafolio →<\u002Fa>\n      <\u002Fdiv>\n    <\u002Fdiv>\n    <div style=\"{{ heroImageWrapStyle }}\">\n      <image-slot id=\"hero-image\" shape=\"rect\" placeholder=\"Mockup de sitio web / marca\"><\u002Fimage-slot>\n    <\u002Fdiv>\n  <\u002Fsection>\n\n  <!-- LOGO / TRUST STRIP -->\n  <div style=\"border-top:1px solid rgba(18,75,39,0.12); border-bottom:1px solid rgba(18,75,39,0.12);\">\n    <div style=\"max-width:1280px; margin:0 auto; padding:28px 40px; display:flex; align-items:center; justify-content:space-between; gap:32px; flex-wrap:wrap;\">\n      <div style=\"font-size:12px; font-weight:600; letter-spacing:0.14em; text-transform:uppercase; opacity:0.55;\">Marcas que confiaron en nosotros<\u002Fdiv>\n      <div style=\"display:flex; gap:48px; flex-wrap:wrap; opacity:0.45; font-size:15px; font-weight:700; letter-spacing:0.02em;\">\n        <span>AURELIA<\u002Fspan>\n        <span>NORTE&nbsp;&amp;&nbsp;CO<\u002Fspan>\n        <span>VELA<\u002Fspan>\n        <span>MERIDIANO<\u002Fspan>\n        <span>OLIVA<\u002Fspan>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fdiv>\n\n  <!-- SERVICIOS / PRECIOS -->\n  <section id=\"servicios\" style=\"max-width:1280px; margin:0 auto; padding:120px 40px;\">\n    <div style=\"text-align:center; max-width:640px; margin:0 auto 72px;\">\n      <div style=\"font-size:13px; font-weight:600; letter-spacing:0.16em; text-transform:uppercase; opacity:0.6; margin-bottom:16px;\">Planes<\u002Fdiv>\n      <h2 style=\"font-size:clamp(32px,4vw,44px); font-weight:700; letter-spacing:-0.02em; margin:0 0 20px;\">Un plan para cada etapa de tu marca<\u002Fh2>\n      <p style=\"font-size:17px; line-height:1.6; opacity:0.7; margin:0;\">Precios claros, sin sorpresas.<\u002Fp>\n    <\u002Fdiv>\n\n    <sc-if value=\"{{ showBillingToggle }}\" hint-placeholder-val=\"{{ true }}\">\n      <div style=\"display:flex; justify-content:center; margin-bottom:56px;\">\n        <div style=\"display:inline-flex; background:rgba(18,75,39,0.06); border-radius:100px; padding:4px;\">\n          <button onclick=\"{{ setMonthly }}\" style=\"{{ monthlyBtnStyle }}\">Mensual<\u002Fbutton>\n          <button onclick=\"{{ setAnnual }}\" style=\"{{ annualBtnStyle }}\">Anual — 2 meses gratis<\u002Fbutton>\n        <\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fsc-if>\n\n    <div style=\"display:grid; grid-template-columns:repeat(auto-fit,minmax(300px,1fr)); gap:28px;\">\n      <sc-for list=\"{{ mainPlans }}\" as=\"plan\" hint-placeholder-count=\"2\">\n        <div style=\"{{ plan.cardStyle }}\">\n          <div style=\"{{ plan.badgeStyle }}\">{{ plan.badge }}<\u002Fdiv>\n          <div style=\"font-size:14px; font-weight:600; letter-spacing:0.08em; text-transform:uppercase; opacity:0.6; margin-bottom:20px;\">{{ plan.name }}<\u002Fdiv>\n          <div style=\"display:flex; align-items:baseline; gap:6px; margin-bottom:8px;\">\n            <span style=\"font-size:{{ plan.priceSize }}; font-weight:700; letter-spacing:-0.02em;\">{{ plan.price }}<\u002Fspan>\n            <span style=\"font-size:15px; opacity:0.55;\">{{ plan.period }}<\u002Fspan>\n          <\u002Fdiv>\n          <p style=\"font-size:15px; line-height:1.6; opacity:0.7; margin:0 0 32px; min-height:48px;\">{{ plan.description }}<\u002Fp>\n          <div style=\"{{ plan.dividerStyle }}\"><\u002Fdiv>\n          <sc-for list=\"{{ plan.features }}\" as=\"feature\" hint-placeholder-count=\"4\">\n            <div style=\"display:flex; align-items:flex-start; gap:10px; margin-bottom:14px; font-size:14.5px; line-height:1.5;\">\n              <span style=\"{{ plan.checkStyle }}\">✓<\u002Fspan>\n              <span style=\"opacity:0.85;\">{{ feature }}<\u002Fspan>\n            <\u002Fdiv>\n          <\u002Fsc-for>\n          <a href=\"#contacto\" style=\"{{ plan.ctaStyle }}\">Solicitar propuesta<\u002Fa>\n        <\u002Fdiv>\n      <\u002Fsc-for>\n    <\u002Fdiv>\n\n    <div style=\"display:flex; justify-content:center; margin-top:28px;\">\n      <sc-for list=\"{{ customPlanList }}\" as=\"plan\" hint-placeholder-count=\"1\">\n        <div style=\"{{ plan.cardStyle }} max-width:460px; width:100%;\">\n          <div style=\"{{ plan.badgeStyle }}\">{{ plan.badge }}<\u002Fdiv>\n          <div style=\"font-size:14px; font-weight:600; letter-spacing:0.08em; text-transform:uppercase; opacity:0.6; margin-bottom:20px;\">{{ plan.name }}<\u002Fdiv>\n          <div style=\"display:flex; align-items:baseline; gap:6px; margin-bottom:8px;\">\n            <span style=\"font-size:{{ plan.priceSize }}; font-weight:700; letter-spacing:-0.02em;\">{{ plan.price }}<\u002Fspan>\n            <span style=\"font-size:15px; opacity:0.55;\">{{ plan.period }}<\u002Fspan>\n          <\u002Fdiv>\n          <p style=\"font-size:15px; line-height:1.6; opacity:0.7; margin:0 0 32px;\">{{ plan.description }}<\u002Fp>\n          <div style=\"{{ plan.dividerStyle }}\"><\u002Fdiv>\n          <sc-for list=\"{{ plan.features }}\" as=\"feature\" hint-placeholder-count=\"3\">\n            <div style=\"display:flex; align-items:flex-start; gap:10px; margin-bottom:14px; font-size:14.5px; line-height:1.5;\">\n              <span style=\"{{ plan.checkStyle }}\">✓<\u002Fspan>\n              <span style=\"opacity:0.85;\">{{ feature }}<\u002Fspan>\n            <\u002Fdiv>\n          <\u002Fsc-for>\n          <a href=\"#contacto\" style=\"{{ plan.ctaStyle }}\">Solicitar propuesta<\u002Fa>\n        <\u002Fdiv>\n      <\u002Fsc-for>\n    <\u002Fdiv>\n  <\u002Fsection>\n\n  <!-- PORTAFOLIO -->\n  <section id=\"portafolio\" style=\"max-width:1280px; margin:0 auto; padding:80px 40px 120px;\">\n    <div style=\"display:flex; align-items:flex-end; justify-content:space-between; gap:24px; margin-bottom:56px; flex-wrap:wrap;\">\n      <div>\n        <div style=\"font-size:13px; font-weight:600; letter-spacing:0.16em; text-transform:uppercase; opacity:0.6; margin-bottom:16px;\">Portafolio<\u002Fdiv>\n        <h2 style=\"font-size:clamp(32px,4vw,44px); font-weight:700; letter-spacing:-0.02em; margin:0; max-width:520px;\">Trabajos recientes<\u002Fh2>\n      <\u002Fdiv>\n      <p style=\"font-size:16px; line-height:1.6; opacity:0.65; max-width:380px; margin:0;\">Una selección de proyectos donde diseño y desarrollo trabajan como una sola pieza.<\u002Fp>\n    <\u002Fdiv>\n    <div style=\"display:grid; grid-template-columns:repeat(auto-fit,minmax(320px,1fr)); gap:32px;\">\n      <div>\n        <div style=\"position:relative; width:100%; aspect-ratio:4/3; border-radius:4px; overflow:hidden; margin-bottom:20px; background:#124b27;\">\n          <sc-for list=\"{{ rematechView }}\" as=\"slide\" hint-placeholder-count=\"3\">\n            <div style=\"{{ slide.wrapStyle }}\">\n              <image-slot id=\"{{ slide.slotId }}\" shape=\"rect\" fit=\"contain\" src=\"{{ slide.src }}\" placeholder=\"{{ slide.placeholder }}\"><\u002Fimage-slot>\n            <\u002Fdiv>\n          <\u002Fsc-for>\n          <button onclick=\"{{ rematechPrev }}\" aria-label=\"Imagen anterior\" style=\"position:absolute; left:12px; top:50%; transform:translateY(-50%); z-index:3; width:38px; height:38px; border-radius:50%; border:none; background:rgba(237,232,208,0.92); color:#124b27; font-size:20px; line-height:1; cursor:pointer; display:flex; align-items:center; justify-content:center;\">‹<\u002Fbutton>\n          <button onclick=\"{{ rematechNext }}\" aria-label=\"Imagen siguiente\" style=\"position:absolute; right:12px; top:50%; transform:translateY(-50%); z-index:3; width:38px; height:38px; border-radius:50%; border:none; background:rgba(237,232,208,0.92); color:#124b27; font-size:20px; line-height:1; cursor:pointer; display:flex; align-items:center; justify-content:center;\">›<\u002Fbutton>\n          <div style=\"position:absolute; bottom:14px; left:0; right:0; z-index:3; display:flex; gap:8px; justify-content:center;\">\n            <button onclick=\"{{ remaGo0 }}\" aria-label=\"Ir a la imagen 1\" style=\"{{ remaDot0Style }}\"><\u002Fbutton>\n            <button onclick=\"{{ remaGo1 }}\" aria-label=\"Ir a la imagen 2\" style=\"{{ remaDot1Style }}\"><\u002Fbutton>\n            <button onclick=\"{{ remaGo2 }}\" aria-label=\"Ir a la imagen 3\" style=\"{{ remaDot2Style }}\"><\u002Fbutton>\n          <\u002Fdiv>\n        <\u002Fdiv>\n        <div style=\"display:flex; align-items:center; justify-content:space-between; gap:12px;\">\n          <div>\n            <div style=\"font-size:17px; font-weight:700; margin-bottom:4px;\">{{ rematechName }}<\u002Fdiv>\n            <div style=\"font-size:13px; opacity:0.55; letter-spacing:0.02em;\">{{ rematechCategory }}<\u002Fdiv>\n          <\u002Fdiv>\n          <span style=\"font-size:13px; font-weight:600; border-bottom:1px solid #124b27; padding-bottom:2px; white-space:nowrap;\">Ver proyecto<\u002Fspan>\n        <\u002Fdiv>\n      <\u002Fdiv>\n      <sc-for list=\"{{ portfolio }}\" as=\"item\" hint-placeholder-count=\"2\">\n        <div>\n          <div style=\"width:100%; aspect-ratio:4/3; border-radius:4px; overflow:hidden; margin-bottom:20px;\">\n            <image-slot id=\"{{ item.slotId }}\" shape=\"rect\" placeholder=\"{{ item.placeholder }}\"><\u002Fimage-slot>\n          <\u002Fdiv>\n          <div style=\"display:flex; align-items:center; justify-content:space-between; gap:12px;\">\n            <div>\n              <div style=\"font-size:17px; font-weight:700; margin-bottom:4px;\">{{ item.name }}<\u002Fdiv>\n              <div style=\"font-size:13px; opacity:0.55; letter-spacing:0.02em;\">{{ item.category }}<\u002Fdiv>\n            <\u002Fdiv>\n            <span style=\"font-size:13px; font-weight:600; border-bottom:1px solid #124b27; padding-bottom:2px; white-space:nowrap;\">Ver proyecto<\u002Fspan>\n          <\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fsc-for>\n    <\u002Fdiv>\n  <\u002Fsection>\n\n  <!-- PROCESO -->\n  <section id=\"proceso\" style=\"background:#124b27; color:#EDE8D0; padding:120px 40px;\">\n    <div style=\"max-width:1280px; margin:0 auto;\">\n      <div style=\"text-align:center; max-width:640px; margin:0 auto 72px;\">\n        <div style=\"font-size:13px; font-weight:600; letter-spacing:0.16em; text-transform:uppercase; opacity:0.55; margin-bottom:16px;\">Proceso<\u002Fdiv>\n        <h2 style=\"font-size:clamp(32px,4vw,44px); font-weight:700; letter-spacing:-0.02em; margin:0 0 20px;\">Cómo llevamos tu web a la realidad<\u002Fh2>\n        <p style=\"font-size:17px; line-height:1.6; opacity:0.75; margin:0;\">Un método simple, transparente y sin sorpresas de principio a fin.<\u002Fp>\n      <\u002Fdiv>\n      <div style=\"display:grid; grid-template-columns:repeat(auto-fit,minmax(240px,1fr)); gap:48px;\">\n        <sc-for list=\"{{ steps }}\" as=\"step\" hint-placeholder-count=\"4\">\n          <div>\n            <div style=\"font-size:15px; font-weight:700; letter-spacing:0.04em; opacity:0.5; margin-bottom:20px; font-variant-numeric:tabular-nums;\">{{ step.index }}<\u002Fdiv>\n            <h3 style=\"font-size:20px; font-weight:700; margin:0 0 12px;\">{{ step.title }}<\u002Fh3>\n            <p style=\"font-size:15px; line-height:1.65; opacity:0.75; margin:0;\">{{ step.description }}<\u002Fp>\n          <\u002Fdiv>\n        <\u002Fsc-for>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fsection>\n\n  <!-- SOBRE NOSOTROS -->\n  <section id=\"nosotros\" style=\"max-width:1280px; margin:0 auto; padding:120px 40px; display:grid; grid-template-columns:0.9fr 1.1fr; gap:64px; align-items:center;\">\n    <div style=\"width:100%; aspect-ratio:1/1; border-radius:4px; overflow:hidden;\">\n      <image-slot id=\"about-image\" shape=\"rect\" placeholder=\"Foto del equipo / estudio\"><\u002Fimage-slot>\n    <\u002Fdiv>\n    <div>\n      <div style=\"font-size:13px; font-weight:600; letter-spacing:0.16em; text-transform:uppercase; opacity:0.6; margin-bottom:20px;\">Sobre nosotros<\u002Fdiv>\n      <h2 style=\"font-size:clamp(30px,3.6vw,40px); font-weight:700; letter-spacing:-0.02em; margin:0 0 24px; line-height:1.15;\">Un estudio pequeño, con estándares altos.<\u002Fh2>\n      <p style=\"font-size:17px; line-height:1.7; opacity:0.75; margin:0 0 20px;\">Somos un equipo reducido de diseñadores y desarrolladores enfocados en un solo tipo de trabajo: sitios web que se sienten hechos a mano, no ensamblados.<\u002Fp>\n      <p style=\"font-size:17px; line-height:1.7; opacity:0.75; margin:0 0 36px;\">Cada proyecto pasa por las mismas manos de principio a fin — sin subcontratar, sin plantillas genéricas.<\u002Fp>\n      <div style=\"display:flex; gap:56px; flex-wrap:wrap;\">\n        <div>\n          <div style=\"font-size:32px; font-weight:700; letter-spacing:-0.02em; margin-bottom:6px;\">40+<\u002Fdiv>\n          <div style=\"font-size:14px; opacity:0.6;\">Proyectos entregados<\u002Fdiv>\n        <\u002Fdiv>\n        <div>\n          <div style=\"font-size:32px; font-weight:700; letter-spacing:-0.02em; margin-bottom:6px;\">8<\u002Fdiv>\n          <div style=\"font-size:14px; opacity:0.6;\">Años de experiencia<\u002Fdiv>\n        <\u002Fdiv>\n        <div>\n          <div style=\"font-size:32px; font-weight:700; letter-spacing:-0.02em; margin-bottom:6px;\">100%<\u002Fdiv>\n          <div style=\"font-size:14px; opacity:0.6;\">Diseño a medida<\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fsection>\n\n  <!-- CONTACTO -->\n  <section id=\"contacto\" style=\"background:#124b27; color:#EDE8D0; padding:120px 40px;\">\n    <div style=\"max-width:1280px; margin:0 auto; display:grid; grid-template-columns:0.9fr 1.1fr; gap:64px;\">\n      <div>\n        <div style=\"font-size:13px; font-weight:600; letter-spacing:0.16em; text-transform:uppercase; opacity:0.55; margin-bottom:20px;\">Contacto<\u002Fdiv>\n        <h2 style=\"font-size:clamp(30px,3.6vw,40px); font-weight:700; letter-spacing:-0.02em; margin:0 0 24px; line-height:1.15;\">Hablemos de tu proyecto.<\u002Fh2>\n        <p style=\"font-size:17px; line-height:1.7; opacity:0.75; margin:0 0 40px; max-width:420px;\">Cuéntanos qué necesitas y te respondemos en menos de 24 horas con una propuesta.<\u002Fp>\n        <div style=\"display:flex; flex-direction:column; gap:18px; font-size:15px;\">\n          <div style=\"display:flex; gap:12px;\"><span style=\"opacity:0.55;\">Email<\u002Fspan><a href=\"mailto:hola@forma.studio\" style=\"color:#EDE8D0; border-bottom:1px solid rgba(237,232,208,0.4);\">hola@forma.studio<\u002Fa><\u002Fdiv>\n          <div style=\"display:flex; gap:12px;\"><span style=\"opacity:0.55;\">Teléfono<\u002Fspan><span>+52 (55) 0000 0000<\u002Fspan><\u002Fdiv>\n          <div style=\"display:flex; gap:12px;\"><span style dden; display:inline-block; font-size:11px; font-weight:700; padding:6px 12px; margin-bottom:20px;',\n        cardStyle: isPopular\n          ? 'background:#124b27; color:#EDE8D0; border-radius:4px; padding:44px 36px; display:flex; flex-direction:column; box-shadow:0 24px 48px rgba(18,75,39,0.18);'\n          : 'background:#ffffff; color:#124b27; border:1px solid rgba(18,75,39,0.12); border-radius:4px; padding:44px 36px; display:flex; flex-direction:column;',\n        dividerStyle: isPopular\n          ? 'height:1px; background:rgba(237,232,208,0.2); margin-bottom:24px;'\n          : 'height:1px; background:rgba(18,75,39,0.12); margin-bottom:24px;',\n        checkStyle: isPopular ? 'opacity:0.85;' : 'opacity:0.6;',\n        ctaStyle: isPopular\n          ? 'margin-top:auto; text-align:center; background:#EDE8D0; color:#124b27; padding:14px 24px; border-radius:2px; font-size:14.5px; font-weight:600;'\n          : 'margin-top:auto; text-align:center; background:#124b27; color:#EDE8D0; padding:14px 24px; border-radius:2px; font-size:14.5px; font-weight:600;',\n      };\n    });\n\n    const steps = [\n      { index: '01', title: 'Descubrimiento', description: 'Entendemos tu marca, tu audiencia y tus objetivos antes de dibujar nada.' },\n      { index: '02', title: 'Diseño', description: 'Creamos una dirección visual única y la afinamos contigo hasta que se sienta correcta.' },\n      { index: '03', title: 'Desarrollo', description: 'Construimos el sitio con estándares técnicos altos: rápido, accesible y responsive.' },\n      { index: '04', title: 'Lanzamiento', description: 'Publicamos, probamos todo y te acompañamos en las primeras semanas en vivo.' },\n    ];\n\n    // Proyecto Rematech: carrusel con las capturas del sitio (Inicio / Productos / Contacto).\n    const rematechSlides = [\n      { slotId: 'rematech-1', src: '4eb68cb0-83ae-48e0-9aef-bf1185a1aebd', placeholder: 'Rematech — Inicio' },\n      { slotId: 'rematech-2', src: 'f3b63981-cabb-433d-87e3-deec3403a51 -items:center;';\n\n    const heroTextWrapStyle = isSplit ? '' : 'max-width:560px;';\n\n    const heroHeadlineStyle = isSplit\n      ? 'font-size:clamp(40px,5vw,64px); line-height:1.05; font-weight:700; letter-spacing:-0.02em; margin:0 0 28px;'\n      : 'font-size:clamp(40px,6vw,68px); line-height:1.05; font-weight:700; letter-spacing:-0.02em; margin:0 auto 28px;';\n\n    const heroSubcopyStyle = 'font-size:18px; line-height:1.6; font-weight:400; color:#124b27; opacity:0.75; margin:0 0 40px;' + (isSplit ? ' max-width:480px;' : ' max-width:560px; margin-left:auto; margin-right:auto;');\n\n    const heroCtaRowStyle = 'display:flex; align-items:center; gap:28px; flex-wrap:wrap;' + (isSplit ? '' : ' justify-content:center; margin-bottom:64px;');\n\n    const heroImageWrapStyle = isSplit\n      ? 'width:100%; aspect-ratio:4/5; border-radius:4px; overflow:hidden;'\n      : 'width:100%; aspect-ratio:16/8; border-radius:4px; overflow:hidden;';\n\n    const mainPlans = plans.filter((p) => p.name !== 'A medida');\n    const customPlanList = plans.filter((p) => p.name === 'A medida');\n\n    return {\n      mainPlans,\n      customPlanList,\n      heroSectionStyle,\n      heroTextWrapStyle,\n      heroHeadlineStyle,\n      heroSubcopyStyle,\n      heroCtaRowStyle,\n      heroImageWrapStyle,\n      showBillingToggle: !!showAnnual,\n      plans,\n      steps,\n      portfolio,\n      rematechView,\n      rematechName: 'Rematech',\n      rematechCategory: 'Tienda de laptops',\n      remaDot0Style: dotStyle(0),\n      remaDot1Style: dotStyle(1),\n      remaDot2Style: dotStyle(2),\n      rematechPrev: () => this.setState({ rematechSlide: (rematechActive + rematechTotal - 1) % rematechTotal }),\n      rematechNext: () => this.setState({ rematechSlide: (rematechActive + 1) % rematechTotal }),\n      remaGo0: () => this.setState({ rematechSlide: 0 }),\n      remaGo1: () => this.setState({ rematechSlide: 1 }),\n      remaGo2: () => this.setState({ rematechSlide: 2 }),\n      monthlyBtnStyle,\n      annualBtnStyle,\n      setMonthly: () => this.setState({ billing: 'monthly' }),\n      setAnnual: () => this.setState({ billing: 'annual' }),\n      submitLabel: 'Enviar mensaje',\n      handleSubmit: this.handleSubmit,\n    };\n  }\n}\n\n<\u002Fscript>\n\n\n<\u002Fbody><\u002Fhtml>"
